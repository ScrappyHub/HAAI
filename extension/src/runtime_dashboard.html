<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>HAAI Recorder</title>
  <style>
    :root{
      --bg:#07111f;--panel:#0d1a2e;--panel2:#13233b;--line:#2a4264;
      --text:#f8fbff;--muted:#a8bad3;--blue:#38bdf8;--green:#22c55e;
      --red:#ef4444;--amber:#f59e0b;
    }
    *{box-sizing:border-box}
    body{width:400px;margin:0;background:var(--bg);color:var(--text);font-family:Segoe UI,Arial,sans-serif}
    .shell{padding:12px}
    .card{border:1px solid var(--line);border-radius:18px;background:#081425;overflow:hidden}
    .head{display:flex;gap:12px;align-items:center;padding:14px}
    .logo{width:38px;height:38px;border:2px solid var(--blue);border-radius:12px;display:grid;place-items:center;color:var(--blue);font-weight:900}
    h1{font-size:21px;margin:0}.sub{font-size:12px;color:var(--muted);margin-top:2px}
    .status{padding:15px;border-top:1px solid rgba(255,255,255,.07);background:#0d1c31}
    .stateRow{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .state{font-size:26px;font-weight:900;line-height:1.05}
    .state.good{color:var(--green)}.state.bad{color:var(--amber)}.state.off{color:#c5d3e7}
    .pill{font-size:12px;font-weight:900;border:1px solid var(--line);border-radius:999px;padding:6px 10px;background:rgba(255,255,255,.04);white-space:nowrap}
    .surface{margin-top:10px;color:#d5e8ff;font-size:13px;line-height:1.35}
    .next{margin-top:12px;border:1px solid rgba(56,189,248,.28);border-radius:12px;padding:10px;background:rgba(56,189,248,.08);font-size:13px;color:#dbeafe}
    .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
    .metric{border:1px solid rgba(255,255,255,.08);border-radius:11px;background:rgba(255,255,255,.035);padding:8px}
    .metric span{display:block;color:var(--muted);font-size:11px}.metric b{display:block;font-size:16px;margin-top:2px}
    .actions{padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;border-top:1px solid rgba(255,255,255,.07)}
    button{border:0;border-radius:12px;padding:11px;background:var(--blue);color:#03111f;font-weight:900;cursor:pointer}
    button.dark{background:#1e2d46;color:#e9f2ff;border:1px solid var(--line)}
    button.green{background:rgba(34,197,94,.20);color:#dcffe9;border:1px solid rgba(34,197,94,.38)}
    button:disabled{opacity:.45;cursor:not-allowed}
    .wide{grid-column:1/-1}
    .live{padding:12px;border-top:1px solid rgba(255,255,255,.07)}
    .liveTop{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px}
    .note{color:var(--green);font-weight:900}
    pre{margin:0;max-height:86px;overflow:auto;white-space:pre-wrap;word-break:break-word;background:#050b18;border:1px solid var(--line);border-radius:12px;padding:10px;color:#dbeafe;font-size:11px;line-height:1.35}
    .advanced{padding:12px;border-top:1px solid rgba(255,255,255,.07);display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .timeline{padding:0 12px 12px;color:var(--muted);font-size:11px}
    .event{display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);padding:5px 0;gap:8px}
    .event b{color:#e8f1ff}
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="head">
        <div class="logo">H</div>
        <div>
          <h1>HAAI Recorder</h1>
          <div class="sub">Local AI evidence capture adapter</div>
        </div>
      </div>

      <div class="status">
        <div class="stateRow">
          <div id="captureRing" class="state off">Checking</div>
          <div id="runtimeState" class="pill">Loading</div>
        </div>
        <div id="surfaceBadge" class="surface">Detecting current page...</div>
        <div id="nextStep" class="next">Waiting for HAAI state.</div>

        <div class="metrics">
          <div class="metric"><span>Provider</span><b id="providerValue">-</b></div>
          <div class="metric"><span>Events</span><b id="eventsValue">0</b></div>
          <div class="metric"><span>Messages</span><b id="messagesValue">0</b></div>
        </div>
      </div>

      <div class="actions">
        <button id="check">Inspect</button>
        <button id="probe" class="dark">Probe</button>
        <button id="begin" class="green">Start Recording</button>
        <button id="stop" class="dark">Stop</button>
        <button id="openWorkbench" class="wide">Open Runtime Viewer</button>
      </div>

      <div class="live">
        <div class="liveTop"><b>What HAAI sees</b><span id="note" class="note">Ready</span></div>
        <pre id="promptBox">No state loaded yet.</pre>
      </div>

      <div class="advanced">
        <button id="exportSession">Export Evidence</button>
        <button id="openLegacyWorkbench" class="dark">Evidence Workbench</button>
        <button id="buildPrompt" class="dark">Build Prompt</button>
        <button id="copyPrompt" class="dark">Copy</button>
      </div>

      <div id="timeline" class="timeline"></div>

      <span id="inputValue" style="display:none"></span>
      <span id="domainValue" style="display:none"></span>
      <span id="summaryCapture" style="display:none"></span>
      <span id="summaryExports" style="display:none"></span>
    </div>
  </div>

  <script src="runtime_dashboard.js"></script>
</body>
</html>
