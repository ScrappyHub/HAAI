<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>HAAI</title>
  <style>
    :root{--bg:#07111f;--card:#0b1728;--line:#263d5c;--text:#f8fbff;--muted:#9fb4d0;--blue:#38bdf8;--green:#22c55e;--amber:#f59e0b;--red:#ef4444}
    *{box-sizing:border-box}
    body{width:360px;margin:0;background:var(--bg);color:var(--text);font-family:Segoe UI,Arial,sans-serif}
    .wrap{padding:14px}
    .card{border:1px solid var(--line);border-radius:20px;background:var(--card);padding:16px}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .brand{font-size:24px;font-weight:900;letter-spacing:-.03em}
    .tiny{font-size:12px;color:var(--muted)}
    .status{font-size:26px;font-weight:900;margin-bottom:8px}
    .status.live{color:var(--green)}.status.ready{color:var(--blue)}.status.bad{color:var(--amber)}
    .site{font-size:18px;font-weight:800;margin-bottom:4px}
    .title{font-size:13px;color:var(--muted);line-height:1.35;max-height:38px;overflow:hidden;margin-bottom:18px}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .stat{border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:10px;background:rgba(255,255,255,.035)}
    .stat span{display:block;color:var(--muted);font-size:11px}.stat b{font-size:18px}
    button{width:100%;border:0;border-radius:14px;padding:13px;font-weight:900;cursor:pointer}
    .primary{background:var(--blue);color:#03111f;font-size:15px}
    .stop{background:rgba(239,68,68,.18);color:#fecaca;border:1px solid rgba(239,68,68,.38)}
    .disabled{opacity:.45;cursor:not-allowed}
    .last{margin-top:14px;color:var(--muted);font-size:12px;line-height:1.35}
    .primaryActionWrap{margin-top:10px}
    .secondaryAction{background:#17263d;color:#dbeafe;border:1px solid var(--line)}
    .msg{margin-top:12px;border:1px solid rgba(56,189,248,.25);background:rgba(56,189,248,.07);border-radius:12px;padding:10px;color:#dbeafe;font-size:12px;line-height:1.35}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div>
          <div class="brand">HAAI</div>
          <div class="tiny">AI evidence recorder</div>
        </div>
        <div id="modePill" class="tiny">checking</div>
      </div>

      <div id="status" class="status ready">Checking</div>
      <div id="site" class="site">Detecting page...</div>
      <div id="title" class="title">Waiting for capture state.</div>

      <div class="stats">
        <div class="stat"><span>Messages</span><b id="messages">0</b></div>
        <div class="stat"><span>Records</span><b id="events">0</b></div>
      </div>

      <div class="primaryActionWrap">
        <button id="primaryAction" class="primary">Start Recording</button>
      </div>
      <div class="primaryActionWrap">
        <button id="exportSession" class="secondaryAction">Export Latest Capture</button>
        <button id="openReplay" class="secondaryAction">Replay Center</button>
      </div>

      <div id="lastSaved" class="last">No saved capture shown yet.</div>
      <div id="message" class="msg">Open a supported AI page to record.</div>
    </div>
  </div>

  <script src="runtime_dashboard.js"></script>
</body>
</html>
