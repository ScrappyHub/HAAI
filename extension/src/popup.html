<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>HAAI Recorder</title>
  <style>
    body{width:410px;margin:0;padding:16px;background:#08111f;color:#f4f8ff;font-family:Segoe UI,Arial,sans-serif}
    .title{font-size:22px;font-weight:800;margin-bottom:6px}.subtitle{color:#9db0c9;margin-bottom:16px}
    .card{border:1px solid #263a57;border-radius:16px;padding:14px;background:#101b2d;margin-bottom:14px}
    .badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.badge{border-radius:999px;padding:7px 12px;font-weight:800;background:#172554}
    .red{background:#991b1b}.green{background:#166534}.meta{color:#bfdbfe;line-height:1.5}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stack{display:grid;gap:10px;margin-top:10px}
    button{border:0;border-radius:12px;padding:13px;background:#38bdf8;color:#02111f;font-weight:800;cursor:pointer}
    button.secondary{background:#1e293b;color:#e2e8f0;border:1px solid #263a57}
    button:disabled{background:#475569;color:#cbd5e1;cursor:not-allowed}
    .label{display:flex;justify-content:space-between;color:#bfdbfe;margin:16px 2px 8px}
    textarea{width:100%;height:170px;border-radius:14px;padding:12px;background:#050b18;color:#dbeafe;border:1px solid #263a57;font-family:Consolas,monospace}
    .hint{margin-top:10px;color:#9db0c9;font-size:12px;line-height:1.4}
  </style>
</head>
<body>
  <div class="title">HAAI Recorder</div>
  <div class="subtitle">Local-first AI evidence recorder and replay capture adapter.</div>

  <div class="card">
    <div class="badges">
      <span id="captureBadge" class="badge red">Inactive</span>
      <span id="surfaceBadge" class="badge">AI surface: unknown</span>
    </div>
    <div id="metaLine" class="meta">Open an AI page and click Check.</div>
  </div>

  <div class="grid">
    <button id="check">Check</button>
    <button id="probe">Probe Page</button>
    <button id="begin">Begin Capture</button>
    <button id="stop">Stop Capture</button>
    <button id="buildPrompt" class="secondary">Build Context Prompt</button>
    <button id="copyPrompt" class="secondary">Copy Prompt</button>
  </div>

  <div class="stack">
    <button id="openWorkbench">Open Workbench</button>
    <button id="exportSession">Export Session</button>
  </div>

  <div class="label">
    <span>Session Summary</span>
    <span id="note">Ready</span>
  </div>

  <textarea id="promptBox" spellcheck="false">Session summary appears here.</textarea>

  <div class="hint">Technical evidence stays available in Workbench. This panel shows the human-readable capture state first.</div>

  <script src="popup.js"></script>
</body>
</html>
