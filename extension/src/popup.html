<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>HAAI Recorder</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: Segoe UI, Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      width: 390px;
      margin: 0;
      padding: 14px;
    }
    h1 { font-size: 18px; margin: 0 0 4px; }
    p { color: #94a3b8; margin: 4px 0 12px; }
    .status {
      border: 1px solid #334155;
      border-radius: 14px;
      background: #111827;
      padding: 10px;
      margin-bottom: 10px;
    }
    .pill {
      display: inline-block;
      border-radius: 999px;
      padding: 5px 9px;
      font-weight: 700;
      margin-right: 6px;
      background: #334155;
    }
    .active { background: #166534; color: #dcfce7; }
    .inactive { background: #7f1d1d; color: #fee2e2; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    button {
      background: #38bdf8;
      color: #06121f;
      border: 0;
      border-radius: 10px;
      padding: 9px;
      font-weight: 800;
      cursor: pointer;
    }
    button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }
    textarea {
      width: 100%;
      height: 220px;
      box-sizing: border-box;
      background: #020617;
      color: #e5e7eb;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 10px;
      resize: vertical;
    }
    .small { font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
  <h1>HAAI Recorder</h1>
  <p>Local-first AI evidence recorder adapter.</p>

  <div class="status">
    <div>
      <span id="statePill" class="pill inactive">Inactive</span>
      <span id="surfacePill" class="pill">No AI surface detected</span>
    </div>
    <div class="small" id="stateDetails">Loading state...</div>
  </div>

  <div class="grid">
    <button id="checkButton">Check</button>
    <button id="probeButton">Probe Page</button>
    <button id="beginButton">Begin Capture</button>
    <button id="stopButton">Stop Capture</button>
    <button id="buildPromptButton">Build Context Prompt</button>
    <button id="copyPromptButton">Copy Prompt</button>
  </div>

  <textarea id="promptBox" placeholder="HAAI output appears here."></textarea>

  <script src="popup.js"></script>
</body>
</html>
