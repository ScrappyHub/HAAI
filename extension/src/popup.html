<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>HAAI Recorder</title>
  <style>
    :root { color-scheme: dark; }
    body {
      width: 380px;
      margin: 0;
      padding: 14px;
      font-family: Inter, Segoe UI, system-ui, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }
    .card {
      background: #111827;
      border: 1px solid #243044;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 12px 28px rgba(0,0,0,.35);
    }
    h2 { margin: 0; font-size: 18px; }
    .small { margin: 5px 0 12px; color: #94a3b8; font-size: 12px; }
    .status {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .pill {
      padding: 5px 8px;
      border-radius: 999px;
      background: #1e293b;
      color: #cbd5e1;
      border: 1px solid #334155;
    }
    .pill.on { background: #064e3b; color: #bbf7d0; border-color: #047857; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button {
      border: 0;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-weight: 650;
    }
    button.secondary { background: #334155; }
    button.good { background: #059669; }
    button.warn { background: #7c2d12; }
    button.copied { background: #475569; color: #cbd5e1; }
    button:disabled {
      cursor: not-allowed;
      opacity: .45;
      background: #334155;
      color: #94a3b8;
    }
    textarea {
      box-sizing: border-box;
      width: 100%;
      height: 230px;
      margin-top: 10px;
      padding: 10px;
      border-radius: 14px;
      border: 1px solid #334155;
      background: #020617;
      color: #e5e7eb;
      font: 12px Consolas, ui-monospace, monospace;
      resize: vertical;
    }
    #notice {
      min-height: 18px;
      margin-top: 8px;
      color: #93c5fd;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>HAAI Recorder</h2>
    <p class="small">Local-first AI evidence recorder adapter.</p>

    <div class="status">
      <span id="capturePill" class="pill">Idle</span>
      <span id="eventPill" class="pill">0 events</span>
    </div>

    <div class="grid">
      <button id="ping" class="secondary">Status</button>
      <button id="begin" class="good">Begin</button>
      <button id="stop" class="warn">Stop</button>
      <button id="buildPrompt">Recovery Prompt</button>
    </div>

    <button id="copyPrompt" class="secondary" style="margin-top:8px;width:100%;">Copy prompt</button>

    <textarea id="promptBox" placeholder="Context recovery prompt appears here."></textarea>
    <div id="notice">Ready.</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
