<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>HAAI Recorder</title>
  <style>
    body { width: 390px; margin: 0; padding: 14px; font-family: Segoe UI, system-ui, sans-serif; background: #0f172a; color: #e5e7eb; }
    h2 { margin: 0; font-size: 18px; }
    .sub { color: #93c5fd; font-size: 12px; margin: 4px 0 12px; }
    .panel { border: 1px solid #334155; border-radius: 14px; padding: 10px; margin-bottom: 10px; background: #111827; }
    .pill { display: inline-block; padding: 5px 8px; border-radius: 999px; background: #7f1d1d; color: white; font-size: 12px; font-weight: 700; margin-right: 6px; }
    .pill.on { background: #065f46; }
    .pill.ai { background: #1d4ed8; }
    .help { color: #cbd5e1; font-size: 12px; margin-top: 6px; line-height: 1.35; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button { border: 0; border-radius: 10px; padding: 10px; background: #38bdf8; color: #020617; font-weight: 800; cursor: pointer; }
    button:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
    textarea { box-sizing: border-box; width: 100%; height: 180px; margin-top: 10px; border-radius: 12px; border: 1px solid #475569; background: #020617; color: #dbeafe; padding: 10px; font: 12px Consolas, monospace; }
    #notice { margin-top: 8px; color: #bfdbfe; font-size: 12px; min-height: 16px; }
  </style>
</head>
<body>
  <h2>HAAI Recorder</h2>
  <div class="sub">Local-first AI evidence recorder adapter.</div>

  <div class="panel">
    <span id="capturePill" class="pill">Inactive</span>
    <span id="surfacePill" class="pill">No AI surface detected</span>
    <div id="humanStatus" class="help">Loading session state...</div>
  </div>

  <div class="grid">
    <button id="check">Check</button>
    <button id="probe">Probe Page</button>
    <button id="begin">Begin Capture</button>
    <button id="stop">Stop Capture</button>
    <button id="prompt">Build Context Prompt</button>
    <button id="copy">Copy Prompt</button>
  </div>

  <textarea id="output" placeholder="Session summary appears here."></textarea>
  <div id="notice">Ready.</div>

  <script src="popup.js"></script>
</body>
</html>
