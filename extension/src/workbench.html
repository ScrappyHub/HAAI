<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>HAAI Workbench</title>
  <style>
    body { margin: 0; background: #08111f; color: #e5e7eb; font-family: Segoe UI, system-ui, sans-serif; }
    header { padding: 22px 28px; border-bottom: 1px solid #1f2937; background: #0f172a; }
    h1 { margin: 0; font-size: 24px; }
    .sub { color: #93c5fd; margin-top: 6px; }
    main { padding: 22px 28px; display: grid; grid-template-columns: 320px 1fr; gap: 18px; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 16px; padding: 16px; box-shadow: 0 14px 40px rgba(0,0,0,.25); }
    .stat { font-size: 26px; font-weight: 800; }
    .label { color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    button { border: 0; border-radius: 10px; padding: 10px 12px; background: #38bdf8; color: #020617; font-weight: 800; cursor: pointer; }
    .timeline { display: grid; gap: 10px; }
    .item { padding: 12px; border: 1px solid #334155; border-radius: 12px; background: #020617; }
    .item strong { color: #bfdbfe; }
    pre { white-space: pre-wrap; word-break: break-word; background: #020617; border: 1px solid #334155; border-radius: 12px; padding: 12px; min-height: 260px; }
  </style>
</head>
<body>
  <header>
    <h1>HAAI Replay & Evidence Workbench</h1>
    <div class="sub">Local-first AI session evidence timeline.</div>
  </header>

  <main>
    <section class="card">
      <div class="label">This week</div>
      <div id="weekCount" class="stat">0</div>
      <br>
      <div class="label">All time</div>
      <div id="allCount" class="stat">0</div>
      <br>
      <div class="label">Current session</div>
      <div id="currentSession">Loading...</div>
      <br>
      <button id="refresh">Refresh Workbench</button>
    </section>

    <section class="card">
      <h2>Capture Timeline</h2>
      <div id="timeline" class="timeline"></div>
      <h2>Selected Evidence</h2>
      <pre id="details">Select a capture to inspect it.</pre>
    </section>
  </main>

  <script src="workbench.js"></script>
</body>
</html>
