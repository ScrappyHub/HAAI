name: haai
services:
  haai_runtime:
    container_name: haai_runtime
    image: haai:local
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${HAAI_BIND}:${HAAI_PORT}:54170"
    restart: unless-stopped
    networks:
      - haai_net

networks:
  haai_net:
    name: haai_net
    driver: bridge
